<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Django WebSocket Chat</title>
<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f2f2f2;
}
.container {
    display: flex;
    width: 1000px;
    height: 600px;
    margin: 40px auto;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}
.sidebar {
    width: 250px;
    border-right: 1px solid #ddd;
    background: #fafafa;
}
.sidebar h2 {
    margin: 0;
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}
.chat-item {
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
}
.chat-item:hover {
    background: #eee;
}
.chat-item.active {
    background: #007bff;
    color: white;
}
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}
.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    background: #f9f9f9;
}
.message {
    margin-bottom: 10px;
}
.message img {
    max-width: 250px;
    margin-top: 5px;
    border-radius: 5px;
}
.message audio {
    margin-top: 5px;
    width: 250px;
}
.deleteBtn {
    margin-left: 10px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
    padding: 3px 6px;
    font-size: 12px;
    border-radius: 3px;
}
form {
    display: flex;
    gap: 5px;
    padding: 10px;
    border-top: 1px solid #ddd;
}
form input[type="text"] {
    flex: 1;
    padding: 8px;
}
#recordBtn {
    background: #28a745;
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 5px;
}
#recordBtn.recording {
    background: red;
}
</style>
</head>

<body>
<div class="container">

<div class="sidebar">
<h2>Your Chats</h2>
<div id="chatList">Loading chats...</div>
</div>

<div class="chat-area">
<div class="messages" id="messages">Select a chat</div>

<form id="messageForm">
<input id="messageText" type="text" placeholder="Type message">
<input id="imageInput" type="file" accept="image/*">
<button type="submit">Send</button>
</form>

<div style="padding:10px;border-top:1px solid #ddd">
<button id="recordBtn">Record Audio</button>
</div>
</div>
</div>

<script>
const backend = "http://127.0.0.1:8000";
const wsPort = 9003;

let currentUser = null;
let currentChatId = null;
let currentReceiver = null;
let ws = null;
let mediaRecorder;
let audioChunks = [];

// ------------------- GET CURRENT USER -------------------
async function getCurrentUser() {
    try {
        const res = await fetch(`${backend}/auth/current_user/`, {credentials:"include"});
        if(!res.ok) throw new Error("Cannot fetch current user");
        const data = await res.json();
        currentUser = data.username;
    } catch(e) {
        console.error(e);
        alert("Please login first");
    }
}

// ------------------- LOAD CHATS -------------------
async function loadChats() {
    try {
        const res = await fetch(`${backend}/chat/chats/`, {credentials:"include"});
        if(!res.ok) throw new Error("Cannot load chats");
        const chats = await res.json();
        const list = document.getElementById("chatList");
        list.innerHTML = "";
        if(chats.length === 0){
            list.innerHTML = "<i>No chats found</i>";
            return;
        }
        chats.forEach(chat => {
            const div = document.createElement("div");
            div.className = "chat-item";
            div.innerText = `${chat.user1_username} & ${chat.user2_username}`;
            div.onclick = () => selectChat(chat.chatid, div, chat.user1_username, chat.user2_username);
            list.appendChild(div);
        });
    } catch(e) {
        console.error(e);
        document.getElementById("chatList").innerHTML = "<i>Error loading chats</i>";
    }
}

// ------------------- SELECT CHAT -------------------
function selectChat(chatId, el, user1, user2) {
    currentChatId = chatId;
    currentReceiver = (user1 === currentUser) ? user2 : user1;
    document.querySelectorAll(".chat-item").forEach(i => i.classList.remove("active"));
    el.classList.add("active");
    connectWebSocket();
}

// ------------------- CONNECT WEBSOCKET -------------------
function connectWebSocket() {
    if(!currentChatId) return;
    if(ws) ws.close();
    ws = new WebSocket(`ws://127.0.0.1:${wsPort}/ws/chat/${currentChatId}/`);
    ws.onopen = () => console.log("WebSocket connected");
    ws.onerror = e => console.error("WebSocket error", e);
    ws.onmessage = e => {
        const data = JSON.parse(e.data);
        if(data.action === "delete"){
            const msgDiv = document.getElementById("msg-"+data.message_id);
            if(msgDiv) msgDiv.innerHTML = "<i>This message was deleted</i>";
            return;
        }
        addMessageToUI(data);
    };
    loadMessages();
}

// ------------------- ADD MESSAGE TO UI -------------------
function addMessageToUI(data){
    const box = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "message";
    div.id = "msg-"+data.message_id;
    div.dataset.sender = data.sender;

    let text = data.message || data.content || "";
    if(data.deleted) text = "<i>This message was deleted</i>";

    let html = `<b>${data.sender}</b>: ${text}`;

    if(data.image){
        let imgSrc = data.image.startsWith("http") ? data.image : `${backend}${data.image}`;
        html += `<br><img src="${imgSrc}">`;
    }

    if(data.audio){
        let audioSrc = data.audio.startsWith("http") ? data.audio : `${backend}${data.audio}`;
        html += `<br><audio controls src="${audioSrc}"></audio>`;
    }

    if(data.sender === currentUser && !data.deleted){
        html += ` <button class="deleteBtn" onclick="deleteMessage(${data.message_id})">Delete</button>`;
    }

    div.innerHTML = html;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

// ------------------- DELETE MESSAGE -------------------
function deleteMessage(message_id){
    if(!ws) return;
    ws.send(JSON.stringify({action:"delete", message_id:message_id}));
}

// ------------------- LOAD OLD MESSAGES -------------------
async function loadMessages(){
    if(!currentChatId) return;
    try {
        const res = await fetch(`${backend}/chat/messages/?chatid=${currentChatId}`, {credentials:"include"});
        if(!res.ok) throw new Error("Cannot load messages");
        const msgs = await res.json();
        const box = document.getElementById("messages");
        box.innerHTML = "";
        msgs.forEach(msg => {
            // Fix URLs for image/audio
            if(msg.image && !msg.image.startsWith("http")) msg.image = `${backend}${msg.image}`;
            if(msg.audio && !msg.audio.startsWith("http")) msg.audio = `${backend}${msg.audio}`;
            addMessageToUI(msg);
        });
    } catch(e) { console.error(e); }
}

// ------------------- SEND IMAGE -------------------
function sendImage(file){
    const reader = new FileReader();
    reader.onload = e => {
        ws.send(JSON.stringify({
            image: e.target.result,
            sender: currentUser,
            receiver: currentReceiver
        }));
    };
    reader.readAsDataURL(file);
}

// ------------------- SEND AUDIO -------------------
function sendAudio(blob){
    const reader = new FileReader();
    reader.onloadend = () => {
        ws.send(JSON.stringify({
            audio: reader.result,
            sender: currentUser,
            receiver: currentReceiver
        }));
    };
    reader.readAsDataURL(blob);
}

// ------------------- SEND MESSAGE -------------------
document.getElementById("messageForm").addEventListener("submit", e=>{
    e.preventDefault();
    if(!currentChatId){ alert("Select a chat"); return; }
    const text = document.getElementById("messageText").value.trim();
    const image = document.getElementById("imageInput").files[0];
    if(text){
        ws.send(JSON.stringify({message:text,sender:currentUser,receiver:currentReceiver}));
    }
    if(image) sendImage(image);
    document.getElementById("messageText").value="";
    document.getElementById("imageInput").value="";
});

// ------------------- AUDIO RECORD -------------------
const recordBtn = document.getElementById("recordBtn");
recordBtn.onclick = async () => {
    if(recordBtn.classList.contains("recording")){
        mediaRecorder.stop();
        recordBtn.classList.remove("recording");
        recordBtn.innerText = "Record Audio";
    } else {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks,{type:"audio/webm"});
            sendAudio(blob);
        };
        mediaRecorder.start();
        recordBtn.classList.add("recording");
        recordBtn.innerText = "Stop Recording";
    }
};

// ------------------- START -------------------
(async()=>{
    await getCurrentUser();
    await loadChats();
})();  





</script>
</body>
</html>
