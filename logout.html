<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logout</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logout-container{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
    width:350px;
}

.logout-container h2{
    margin-bottom:10px;
}

.logout-container p{
    color:#555;
    margin-bottom:25px;
}

.logout-btn{
    background:#ff4b5c;
    border:none;
    padding:12px 25px;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.logout-btn:hover{
    background:#e63946;
    transform:scale(1.05);
}

.loading{
    display:none;
    margin-top:15px;
    font-size:14px;
    color:#444;
}

</style>

</head>

<body>

<div class="logout-container">

<h2>Logout</h2>
<p>Are you sure you want to logout from the chat application?</p>

<button class="logout-btn" onclick="logoutUser()">Logout</button>

<div class="loading" id="loadingText">
Logging out...
</div>

</div>

<script>

function logoutUser(){

document.getElementById("loadingText").style.display="block";

fetch("http://127.0.0.1:8000/logout/",{
method:"POST",
credentials:"include",
headers:{
"Content-Type":"application/json"
}
})

.then(response=>response.json())
.then(data=>{

alert(data.message);

window.location.href="/login.html";

})

.catch(error=>{
console.error("Logout Error:",error);
});

}

</script>

</body>
</html>
